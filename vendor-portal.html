<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viking Heads — Vendor Portal</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2a;--bg2:#111f30;--bg3:#152538;--border:#1a3050;
  --gold:#c9a227;--gold-dim:#b8922a;--gold-bright:#e0b830;
  --text:#e8e8e8;--text-dim:#8899aa;--white:#fff;
  --green:#2ecc71;--red:#e74c3c;--radius:6px;
}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
a{color:var(--gold)}
input,select,button,textarea{font-family:inherit;font-size:inherit}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Login Screen ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at center,#142640 0%,var(--bg) 70%)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.4),0 2px 12px rgba(0,0,0,.3)}
.login-box .login-logo{display:block;margin:0 auto 20px;max-width:280px;width:80%;height:auto;mix-blend-mode:lighten;border-radius:6px}
.login-box h1{font-size:2.2rem;color:var(--gold);letter-spacing:4px;margin-bottom:4px;font-weight:800}
.login-box .subtitle{color:var(--text-dim);font-size:.85rem;letter-spacing:6px;margin-bottom:32px}
.login-box label{display:block;text-align:left;color:var(--text-dim);font-size:.8rem;margin-bottom:4px;margin-top:16px;letter-spacing:1px}
.login-box select,.login-box input[type="text"]{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.95rem}
.login-box select:focus,.login-box input:focus{outline:none;border-color:var(--gold)}
.login-box select option{background:var(--bg);color:var(--text)}
.login-error{color:var(--red);font-size:.85rem;margin-top:12px;min-height:1.3em}
.btn-gold{background:var(--gold);color:#000;border:none;border-radius:var(--radius);padding:12px 28px;font-weight:bold;font-size:1rem;cursor:pointer;letter-spacing:1px;transition:all .2s ease;box-shadow:0 2px 8px rgba(201,162,39,.3)}
.btn-gold:hover{background:var(--gold-bright);box-shadow:0 4px 16px rgba(201,162,39,.4)}
.btn-gold:active{transform:scale(.97);box-shadow:0 1px 4px rgba(201,162,39,.2)}
.btn-gold:focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;pointer-events:none;box-shadow:none}
.login-box .btn-gold{margin-top:24px;width:100%}

/* ── App Shell ── */
#appShell{display:none}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
header .brand{display:flex;align-items:center;gap:10px}
header .brand img{height:32px;width:auto;mix-blend-mode:lighten}
header .shop-label{color:var(--text-dim);font-size:.85rem}
header .shop-label strong{color:var(--text)}
.btn-sm{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:var(--radius);padding:6px 16px;cursor:pointer;font-size:.8rem;letter-spacing:1px;transition:all .2s ease}
.btn-sm:hover{background:var(--gold);color:#000}
.btn-sm:active{transform:scale(.97)}
.btn-sm:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--bg2);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs button{background:transparent;border:none;color:var(--text-dim);padding:12px 18px;cursor:pointer;white-space:nowrap;font-size:.8rem;letter-spacing:1px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
.tabs button:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}

/* ── Main Layout ── */
.main-wrap{display:flex;min-height:calc(100vh - 110px)}
.catalog-area{flex:1;padding:20px;overflow-y:auto}
.sidebar{width:320px;background:var(--bg2);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;position:sticky;top:0;height:calc(100vh - 110px);overflow-y:auto}
@media(max-width:900px){
  .main-wrap{flex-direction:column}
  .sidebar{display:none}
}

/* ── Floating mobile cart bar ── */
.mobile-cart{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--gold);padding:12px 16px;z-index:500;align-items:center;justify-content:space-between;gap:10px}
.mobile-cart .cart-info{display:flex;gap:16px;font-size:.85rem}
.mobile-cart .cart-info span{color:var(--text-dim)}
.mobile-cart .cart-info strong{color:var(--gold)}
.mobile-cart .btn-gold{padding:10px 20px;font-size:.85rem}
@media(min-width:901px){
  .mobile-cart{display:none !important}
}
@media(max-width:900px){
  .catalog-area{padding:14px 10px;padding-bottom:80px}
}

/* ── Mobile: bigger tabs ── */
@media(max-width:600px){
  .tabs button{padding:14px 14px;font-size:.75rem;letter-spacing:.5px}
  header{padding:10px 14px}
  header .brand img{height:26px}
  header span[style]{font-size:.65rem !important}
}

/* ── Mobile: card layout for catalog rows ── */
@media(max-width:640px){
  table.catalog thead{display:none}
  table.catalog,table.catalog tbody,table.catalog tr,table.catalog td{display:block;width:100%}
  table.catalog tr{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:4px;display:grid;grid-template-columns:auto auto 1fr;grid-template-rows:auto auto;gap:2px 10px;align-items:center}
  table.catalog tr:hover td{background:transparent}
  table.catalog td{border:none;padding:1px 0;font-size:.8rem}
  table.catalog td:nth-child(1){grid-row:1;grid-column:1;font-weight:bold}
  table.catalog td:nth-child(2){grid-row:1;grid-column:2;color:var(--text-dim)}
  table.catalog td:nth-child(3){grid-row:1;grid-column:3;text-align:right}
  table.catalog td:nth-child(4){grid-row:2;grid-column:1 / -1;padding-top:4px;display:flex;align-items:center;justify-content:space-between}
  table.catalog td:nth-child(5){display:none}
  .qty-btn{width:36px;height:36px;font-size:1.2rem}
  .qty-wrap .qty-input{width:50px;height:36px;font-size:1rem}
  .color-group{margin-bottom:12px}
  .color-group h3{font-size:.8rem;padding:6px 10px}
  .cat-section h2{font-size:.95rem;margin-bottom:2px}
  .login-box{padding:32px 24px}
  .login-box h1{font-size:1.4rem}
  .modal{margin:10px;max-height:90vh;border-radius:8px}
  .modal-header{padding:14px 16px}
  .modal-body{padding:14px 16px}
  .modal-footer{padding:12px 16px;flex-direction:column}
  .modal-footer button{width:100%}
}

/* ── Catalog Table ── */
.cat-section{display:none}
.cat-section.active{display:block;animation:fadeIn .25s ease}
.cat-section h2{color:var(--gold);font-size:1.1rem;margin-bottom:4px;letter-spacing:1px}
.cat-section .desc{color:var(--text-dim);font-size:.8rem;margin-bottom:16px}
.color-group{margin-bottom:24px}
.color-group h3{color:var(--gold-dim);font-size:.9rem;padding:8px 12px;background:var(--bg3);border-left:3px solid var(--gold);margin-bottom:0;letter-spacing:1px}
table.catalog{width:100%;border-collapse:collapse}
table.catalog th{text-align:left;color:var(--text-dim);font-size:.75rem;letter-spacing:1px;padding:10px 12px;border-bottom:1px solid rgba(26,48,80,.6);position:sticky;top:0;background:var(--bg)}
table.catalog td{padding:10px 12px;border-bottom:1px solid rgba(26,48,80,.25);font-size:.85rem;vertical-align:middle;transition:background .15s ease}
table.catalog tbody tr:nth-child(even) td{background:rgba(255,255,255,.015)}
@media(hover:hover){table.catalog tr:hover td{background:rgba(201,162,39,.07)}}
table.catalog .price{color:var(--gold);font-weight:bold}
table.catalog .line-total{color:var(--green);font-weight:bold;min-width:60px}
.view-toggle{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:.8rem;color:var(--text-dim)}
.view-toggle span{letter-spacing:1px}
.view-toggle button{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;cursor:pointer;font-size:.8rem;letter-spacing:.5px;transition:all .2s}
.view-toggle button:first-of-type{border-radius:var(--radius) 0 0 var(--radius);border-right:none}
.view-toggle button:last-of-type{border-radius:0 var(--radius) var(--radius) 0}
.view-toggle button.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}
.view-toggle button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
input.qty-input{width:64px;padding:8px 6px;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.95rem;font-weight:bold}
input.qty-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,39,.2)}
input.qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.qty-input[type=number]{-moz-appearance:textfield}
.qty-wrap{display:inline-flex;align-items:center;gap:0}
.qty-btn{width:32px;height:34px;background:var(--bg3);border:1px solid var(--border);color:var(--gold);font-size:1.1rem;font-weight:bold;cursor:pointer;transition:background .15s;line-height:1}
.qty-btn:first-child{border-radius:var(--radius) 0 0 var(--radius);border-right:none}
.qty-btn:last-child{border-radius:0 var(--radius) var(--radius) 0;border-left:none}
.qty-btn:hover{background:var(--gold);color:#000}
.qty-btn:active{transform:scale(.95)}
.qty-btn:focus-visible{outline:2px solid var(--gold);outline-offset:-1px}
.qty-wrap .qty-input{border-radius:0;width:56px}

/* ── Sidebar ── */
.sidebar h3{color:var(--gold);font-size:.95rem;letter-spacing:2px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-box{background:linear-gradient(135deg,var(--bg) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center;transition:border-color .2s}
.stat-box:hover{border-color:rgba(201,162,39,.3)}
.stat-box .val{font-size:1.4rem;font-weight:bold;color:var(--gold)}
.stat-box .label{font-size:.7rem;color:var(--text-dim);letter-spacing:1px;margin-top:2px}
.sidebar-items{flex:1;overflow-y:auto;margin-bottom:16px;font-size:.8rem}
.sidebar-items .empty{color:var(--text-dim);text-align:center;padding:24px 0}
.sidebar-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(26,48,80,.3)}
.sidebar-item .name{color:var(--text)}
.sidebar-item .amt{color:var(--gold);font-weight:bold}
.btn-review{width:100%;padding:14px;font-size:1rem}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:700px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{color:var(--gold);font-size:1.1rem;letter-spacing:2px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--text)}
.modal-close:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}
.review-group{margin-bottom:16px}
.review-group h4{color:var(--gold-dim);font-size:.85rem;margin-bottom:8px;letter-spacing:1px}
.review-table{width:100%;border-collapse:collapse;font-size:.8rem}
.review-table th{text-align:left;color:var(--text-dim);padding:6px 8px;border-bottom:1px solid var(--border)}
.review-table td{padding:6px 8px;border-bottom:1px solid rgba(26,48,80,.3)}
.review-table .price{color:var(--gold)}
.review-total{text-align:right;font-size:1.1rem;color:var(--gold);font-weight:bold;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}

/* ── Confirmation ── */
#confirmScreen{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
#confirmScreen.show{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:48px 40px;max-width:500px;width:100%;text-align:center;animation:scaleIn .4s cubic-bezier(.175,.885,.32,1.275)}
.confirm-box .check{width:72px;height:72px;border-radius:50%;border:3px solid var(--green);margin:0 auto 20px;position:relative;animation:circleIn .4s ease .1s both}
.confirm-box .check::after{content:'';position:absolute;left:16px;top:22px;width:18px;height:32px;border:solid var(--green);border-width:0 3px 3px 0;transform:rotate(45deg);animation:checkDraw .3s ease .45s both}
.confirm-box h2{color:var(--gold);margin-bottom:8px;letter-spacing:2px}
.confirm-box .order-num{font-size:1.3rem;color:var(--text);margin:16px 0;padding:12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)}
.confirm-box p{color:var(--text-dim);font-size:.85rem;margin-bottom:20px}

/* ── Order History Tab ── */
.order-history-section{display:none;animation:fadeIn .25s ease}
.order-history-section.active{display:block}
.oh-empty{text-align:center;color:var(--text-dim);padding:48px 20px;font-size:.9rem}
.oh-loading{text-align:center;color:var(--text-dim);padding:48px 20px;font-size:.9rem}
.oh-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.oh-card:hover{border-color:rgba(201,162,39,.3)}
.oh-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:12px;flex-wrap:wrap}
.oh-card-header:hover{background:rgba(255,255,255,.02)}
.oh-order-num{color:var(--text);font-weight:bold;font-size:.9rem;letter-spacing:.5px}
.oh-date{color:var(--text-dim);font-size:.8rem}
.oh-meta{display:flex;gap:16px;align-items:center;font-size:.8rem}
.oh-meta span{color:var(--text-dim)}
.oh-meta strong{color:var(--gold)}
.oh-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
.oh-badge.pending{background:rgba(201,162,39,.15);color:#e0b830;border:1px solid rgba(201,162,39,.3)}
.oh-badge.poured{background:rgba(52,152,219,.15);color:#5dade2;border:1px solid rgba(52,152,219,.3)}
.oh-badge.shipped{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3)}
.oh-expand{color:var(--text-dim);font-size:.8rem;transition:transform .2s}
.oh-card.open .oh-expand{transform:rotate(180deg)}
.oh-card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.oh-card.open .oh-card-body{display:block}
.oh-card-body table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:10px}
.oh-card-body th{text-align:left;color:var(--text-dim);padding:6px 8px;border-bottom:1px solid var(--border);font-size:.7rem;letter-spacing:1px}
.oh-card-body td{padding:6px 8px;border-bottom:1px solid rgba(26,48,80,.3)}
.oh-card-body .price{color:var(--gold)}
.oh-notes{color:var(--text-dim);font-size:.8rem;margin-top:10px;padding:8px 10px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);font-style:italic}
@media(max-width:640px){
  .oh-card-header{padding:10px 12px}
  .oh-meta{gap:10px;font-size:.75rem}
  .oh-card-body table thead{display:none}
  .oh-card-body table,.oh-card-body table tbody,.oh-card-body table tr,.oh-card-body table td{display:block;width:100%}
  .oh-card-body table tr{padding:6px 0;border-bottom:1px solid rgba(26,48,80,.3)}
  .oh-card-body table td{border:none;padding:2px 0;font-size:.78rem}
  .oh-card-body table td::before{content:attr(data-label) ": ";color:var(--text-dim);font-size:.7rem}
}

/* ── Order Notes Textarea ── */
.order-notes-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.order-notes-wrap label{display:block;color:var(--text-dim);font-size:.75rem;letter-spacing:1px;margin-bottom:6px}
.order-notes-wrap textarea{width:100%;min-height:72px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.85rem;resize:vertical;line-height:1.5}
.order-notes-wrap textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,39,.2)}
.order-notes-wrap textarea::placeholder{color:var(--text-dim);opacity:.7}

/* ── Copy Summary Button ── */
.btn-copy{background:var(--bg3);color:var(--gold);border:1px solid var(--gold);border-radius:var(--radius);padding:10px 20px;cursor:pointer;font-size:.85rem;letter-spacing:1px;transition:all .2s;margin-top:12px}
.btn-copy:hover{background:var(--gold);color:#000}
.btn-copy:active{transform:scale(.97)}
.btn-copy:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.confirm-summary{text-align:left;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:16px 0;font-size:.8rem;max-height:300px;overflow-y:auto;white-space:pre-wrap;color:var(--text);line-height:1.6}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes circleIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes checkDraw{from{opacity:0;height:0}to{opacity:1;height:32px}}
</style>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="loginScreen">
  <div class="login-box">
    <img class="login-logo" src="viking-heads-logo.jpg" alt="Viking Heads">
    <div class="subtitle">VENDOR PORTAL</div>
    <label>SHOP NAME</label>
    <select id="shopSelect"><option value="">— Select your shop —</option></select>
    <label>ACCESS CODE</label>
    <input type="text" id="accessCode" placeholder="Enter your access code" autocomplete="off">
    <div class="login-error" id="loginError">&nbsp;</div>
    <button class="btn-gold" onclick="attemptLogin()">SIGN IN</button>
    <div style="margin-top:16px"><a href="#" onclick="forgotCode(event)" style="color:var(--text-dim);font-size:.8rem">Forgot your access code?</a></div>
  </div>
</div>

<!-- ═══════════ APP SHELL ═══════════ -->
<div id="appShell">
  <header>
    <div style="display:flex;align-items:center">
      <span class="brand"><img src="viking-heads-logo.jpg" alt="Viking Heads"></span>
      <span style="color:var(--text-dim);font-size:.8rem;margin-left:8px;letter-spacing:2px;line-height:1">VENDOR PORTAL</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <span class="shop-label">Shop: <strong id="headerShop"></strong></span>
      <button class="btn-sm" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div class="tabs" id="tabBar"></div>

  <div class="main-wrap">
    <div class="catalog-area" id="catalogArea"></div>
    <div class="sidebar">
      <h3>ORDER SUMMARY</h3>
      <div class="summary-stats">
        <div class="stat-box"><div class="val" id="sumItems">0</div><div class="label">ITEMS</div></div>
        <div class="stat-box"><div class="val" id="sumUnits">0</div><div class="label">PACKS</div></div>
      </div>
      <div class="summary-stats" style="grid-template-columns:1fr">
        <div class="stat-box"><div class="val" id="sumTotal">$0.00</div><div class="label">ORDER TOTAL</div></div>
      </div>
      <div class="sidebar-items" id="sidebarItems"><div class="empty">No items added yet</div></div>
      <button class="btn-gold btn-review" onclick="openReview()">REVIEW ORDER</button>
    </div>
  </div>
</div>

<!-- ═══════════ MOBILE CART BAR ═══════════ -->
<div class="mobile-cart" id="mobileCart">
  <div class="cart-info">
    <span><strong id="mobItems">0</strong> items</span>
    <span><strong id="mobPacks">0</strong> packs</span>
    <span><strong id="mobTotal">$0.00</strong></span>
  </div>
  <button class="btn-gold" onclick="openReview()">REVIEW</button>
</div>

<!-- ═══════════ REVIEW MODAL ═══════════ -->

let currentShop = null;

function populateShopDropdown() {
  const sel = document.getElementById('shopSelect');
  SHOPS.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.name; opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

function attemptLogin() {
  const shop = document.getElementById('shopSelect').value;
  const code = document.getElementById('accessCode').value.trim().toUpperCase();
  const errEl = document.getElementById('loginError');
  if (!shop) { errEl.textContent = 'Please select your shop.'; return; }
  if (!code) { errEl.textContent = 'Please enter your access code.'; return; }
  const match = SHOPS.find(s => s.name === shop);
  if (!match || match.code !== code) {
    errEl.textContent = 'Invalid access code for this shop.';
    return;
  }
  currentShop = shop;
  sessionStorage.setItem('vkVendorShop', shop);
  sessionStorage.setItem('vkVendorCode', code);
  showApp();
}

function checkSession() {
  const shop = sessionStorage.getItem('vkVendorShop');
  const code = sessionStorage.getItem('vkVendorCode');
  if (shop && code) {
    const match = SHOPS.find(s => s.name === shop && s.code === code);
    if (match) { currentShop = shop; showApp(); return; }
  }
  document.getElementById('loginScreen').style.display = 'flex';
}

function logout() {
  sessionStorage.removeItem('vkVendorShop');
  sessionStorage.removeItem('vkVendorCode');
  currentShop = null;
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('confirmScreen').className = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('accessCode').value = '';
  document.getElementById('loginError').innerHTML = '&nbsp;';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';

/* ──────────────────────────────────────────────

   ────────────────────────────────────────────── */
let built = false;

// Track view mode per category
const viewModes = {};

function buildCatalog() {
  if (built) return;
  built = true;

  const tabBar = document.getElementById('tabBar');
  const area = document.getElementById('catalogArea');

  CATALOG.forEach(cat => {
    viewModes[cat.id] = 'color';

    // Tab button
    const btn = document.createElement('button');
    btn.textContent = cat.label;
    btn.dataset.tab = cat.id;
    btn.onclick = () => switchTab(cat.id);
    tabBar.appendChild(btn);

    // Section
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = 'sec-' + cat.id;
    area.appendChild(sec);

    renderCatalogSection(cat);
  });

  // Order History tab
  const ohBtn = document.createElement('button');
  ohBtn.textContent = 'ORDER HISTORY';
  ohBtn.dataset.tab = 'orderhistory';
  ohBtn.onclick = () => switchTab('orderhistory');
  tabBar.appendChild(ohBtn);

  const ohSec = document.createElement('div');
  ohSec.className = 'order-history-section';
  ohSec.id = 'sec-orderhistory';
  ohSec.innerHTML = '<div class="oh-loading">Loading order history...</div>';
  area.appendChild(ohSec);
}

function getQtyValues(sectionEl) {
  const vals = {};
  sectionEl.querySelectorAll('.qty-input').forEach(inp => {
    const v = parseInt(inp.value) || 0;
    if (v > 0) vals[inp.dataset.sku] = v;
  });
  return vals;
}

function restoreQtyValues(sectionEl, vals) {
  sectionEl.querySelectorAll('.qty-input').forEach(inp => {
    const v = vals[inp.dataset.sku];
    if (v) { inp.value = v; updateLine(inp); }
  });
}

function toggleView(catId) {
  const sec = document.getElementById('sec-' + catId);
  const saved = getQtyValues(sec);
  viewModes[catId] = viewModes[catId] === 'color' ? 'size' : 'color';
  const cat = CATALOG.find(c => c.id === catId);
  renderCatalogSection(cat);
  restoreQtyValues(sec, saved);
}

function renderCatalogSection(cat) {
  const sec = document.getElementById('sec-' + cat.id);
  const mode = viewModes[cat.id];
  const showToggle = cat.colors.length > 1 && cat.sizes.length > 1;

  let html = `<h2>${cat.title}</h2>${cat.packInfo ? `<div style="color:var(--text-dim);font-size:.8rem;margin-bottom:12px">${cat.packInfo}</div>` : ''}`;

  if (showToggle) {
    html += `<div class="view-toggle"><span>VIEW BY</span>
      <button class="${mode === 'color' ? 'active' : ''}" onclick="toggleView('${cat.id}')">COLOR</button>
      <button class="${mode === 'size' ? 'active' : ''}" onclick="toggleView('${cat.id}')">SIZE</button></div>`;
  }

  if (mode === 'color') {
    cat.colors.forEach(color => {
      html += `<div class="color-group"><h3>${color}</h3>`;
      html += `<table class="catalog"><thead><tr>
        <th>SIZE</th><th>HOOK</th><th>PRICE</th><th style="text-align:center">PACKS</th><th style="text-align:right">TOTAL</th>
      </tr></thead><tbody>`;
      cat.sizes.forEach(sz => {
        html += buildRow(cat, color, sz);
      });
      html += `</tbody></table></div>`;
    });
  } else {
    cat.sizes.forEach(sz => {
      html += `<div class="color-group"><h3>${sz.size} — Hook ${sz.hook}</h3>`;
      html += `<table class="catalog"><thead><tr>
        <th>COLOR</th><th>PRICE</th><th style="text-align:center">PACKS</th><th style="text-align:right">TOTAL</th>
      </tr></thead><tbody>`;
      cat.colors.forEach(color => {
        html += buildRowBySize(cat, color, sz);
      });
      html += `</tbody></table></div>`;
    });
  }

  sec.innerHTML = html;
}

function buildRow(cat, color, sz) {
  let price = sz.price;
  if (cat.priceOverrides) {
    const key = color + '|' + sz.size;
    if (cat.priceOverrides[key] !== undefined) price = cat.priceOverrides[key];
  }
  const skuKey = `${cat.id}|${color}|${sz.size}|${sz.hook}`;
  return `<tr>
    <td>${sz.size}</td>
    <td>${sz.hook}</td>
    <td class="price">$${price.toFixed(2)}</td>
    <td style="text-align:center">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjustQty(this,-1)">−</button>
        <input type="number" class="qty-input" min="0" value="0"
          data-sku="${escHtml(skuKey)}" data-price="${price}"
          data-cat="${escHtml(cat.title)}" data-color="${escHtml(color)}"
          data-size="${escHtml(sz.size)}" data-hook="${escHtml(sz.hook)}"
          oninput="updateLine(this)">
        <button class="qty-btn" onclick="adjustQty(this,1)">+</button>
      </div>
    </td>
    <td class="line-total" style="text-align:right" id="lt-${hashCode(skuKey)}">—</td>
  </tr>`;
}

function buildRowBySize(cat, color, sz) {
  let price = sz.price;
  if (cat.priceOverrides) {
    const key = color + '|' + sz.size;
    if (cat.priceOverrides[key] !== undefined) price = cat.priceOverrides[key];
  }
  const skuKey = `${cat.id}|${color}|${sz.size}|${sz.hook}`;
  return `<tr>
    <td>${color}</td>
    <td class="price">$${price.toFixed(2)}</td>
    <td style="text-align:center">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjustQty(this,-1)">−</button>
        <input type="number" class="qty-input" min="0" value="0"
          data-sku="${escHtml(skuKey)}" data-price="${price}"
          data-cat="${escHtml(cat.title)}" data-color="${escHtml(color)}"
          data-size="${escHtml(sz.size)}" data-hook="${escHtml(sz.hook)}"
          oninput="updateLine(this)">
        <button class="qty-btn" onclick="adjustQty(this,1)">+</button>
      </div>
    </td>
    <td class="line-total" style="text-align:right" id="lt-${hashCode(skuKey)}">—</td>
  </tr>`;
}

function switchTab(id) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.cat-section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
  const ohSec = document.getElementById('sec-orderhistory');
  if (ohSec) {
    ohSec.classList.toggle('active', id === 'orderhistory');
    if (id === 'orderhistory') loadOrderHistory();
  }
}

/* ──────────────────────────────────────────────
   CART LOGIC
   ────────────────────────────────────────────── */
function updateLine(input) {
  const qty = Math.max(0, parseInt(input.value) || 0);
  const price = parseFloat(input.dataset.price);
  const key = input.dataset.sku;
  const ltEl = document.getElementById('lt-' + hashCode(key));
  if (qty > 0) {
    ltEl.textContent = '$' + (qty * price).toFixed(2);
  } else {
    ltEl.textContent = '—';
  }
  updateSummary();
}

function getCartItems() {
  const items = [];
  document.querySelectorAll('.qty-input').forEach(inp => {
    const qty = parseInt(inp.value) || 0;
    if (qty > 0) {
      items.push({
        category: inp.dataset.cat,
        color: inp.dataset.color,
        size: inp.dataset.size,
        hook: inp.dataset.hook,
        price: parseFloat(inp.dataset.price),
        qty: qty,
        total: qty * parseFloat(inp.dataset.price)
      });
    }
  });
  return items;
}

function updateSummary() {
  const items = getCartItems();
  const totalItems = items.length;
  const totalUnits = items.reduce((s,i) => s + i.qty, 0);
  const totalPrice = items.reduce((s,i) => s + i.total, 0);

  document.getElementById('sumItems').textContent = totalItems;
  document.getElementById('sumUnits').textContent = totalUnits;
  document.getElementById('sumTotal').textContent = '$' + totalPrice.toFixed(2);

  // Mobile cart bar
  const mob = document.getElementById('mobileCart');
  if (mob) {
    document.getElementById('mobItems').textContent = totalItems;
    document.getElementById('mobPacks').textContent = totalUnits;
    document.getElementById('mobTotal').textContent = '$' + totalPrice.toFixed(2);
    mob.style.display = totalItems > 0 ? 'flex' : '';
  }

  const el = document.getElementById('sidebarItems');
  if (!items.length) {
    el.innerHTML = '<div class="empty">No items added yet</div>';
    return;
  }

  let html = '';
  items.forEach(i => {
    const label = `${i.color} ${i.size}` + (i.hook !== '—' ? ` (${i.hook})` : '');
    html += `<div class="sidebar-item"><span class="name">${escHtml(label)} &times;${i.qty}</span><span class="amt">$${i.total.toFixed(2)}</span></div>`;
  });
  el.innerHTML = html;
}

/* ──────────────────────────────────────────────
   REVIEW MODAL
   ────────────────────────────────────────────── */
function openReview() {
  const items = getCartItems();
  if (!items.length) { alert('Add items to your order first.'); return; }

  const grouped = {};
  items.forEach(i => {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  let html = '';
  const totalPrice = items.reduce((s,i) => s + i.total, 0);
  const totalUnits = items.reduce((s,i) => s + i.qty, 0);

  for (const [cat, list] of Object.entries(grouped)) {
    html += `<div class="review-group"><h4>${escHtml(cat)}</h4>`;
    html += `<table class="review-table"><thead><tr><th>Color</th><th>Size</th><th>Hook</th><th>Packs</th><th style="text-align:right">Total</th></tr></thead><tbody>`;
    list.forEach(i => {
      html += `<tr><td>${escHtml(i.color)}</td><td>${i.size}</td><td>${i.hook}</td><td>${i.qty}</td><td class="price" style="text-align:right">$${i.total.toFixed(2)}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `<div class="review-total">${totalUnits} packs &mdash; $${totalPrice.toFixed(2)}</div>`;

  html += `<div class="order-notes-wrap"><label>ORDER NOTES</label>
    <textarea id="orderNotes" placeholder="Special requests or notes (optional)"></textarea></div>`;

  document.getElementById('reviewBody').innerHTML = html;
  document.getElementById('reviewModal').classList.add('show');
}

function closeReview() {
  document.getElementById('reviewModal').classList.remove('show');
}

/* ──────────────────────────────────────────────
   SUBMIT ORDER
   ────────────────────────────────────────────── */
async function submitOrder() {
  const items = getCartItems();
  if (!items.length) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'SUBMITTING...';

  const totalPrice = items.reduce((s,i) => s + i.total, 0);
  const totalUnits = items.reduce((s,i) => s + i.qty, 0);

  const orderNum = 'VKV-' + Date.now().toString(36).toUpperCase();

  const notesEl = document.getElementById('orderNotes');
  const notes = notesEl ? notesEl.value.trim() : '';

  const order = {
    orderNumber: orderNum,
    shop: currentShop,
    items: items,
    totalUnits: totalUnits,
    totalPrice: parseFloat(totalPrice.toFixed(2)),
    status: 'pending',
    submittedAt: new Date().toISOString(),
    timestamp: firebase.database.ServerValue.TIMESTAMP
  };
  if (notes) order.notes = notes;

  try {
    await db.ref('vendorOrders').push(order);

    // Save to localStorage for order history (Firebase read rules may block queries)
    const lsKey = 'vk_orders_' + currentShop;
    const saved = JSON.parse(localStorage.getItem(lsKey) || '[]');
    saved.unshift({ ...order, timestamp: Date.now() });
    localStorage.setItem(lsKey, JSON.stringify(saved));

    closeReview();
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('confirmOrderNum').textContent = orderNum;

    // Build summary text for confirmation screen and clipboard
    lastOrderSummary = buildOrderSummaryText(orderNum, currentShop, items, totalUnits, totalPrice, notes);
    document.getElementById('confirmSummaryText').textContent = lastOrderSummary;

    document.getElementById('confirmScreen').className = 'show';
  } catch (err) {
    alert('Error submitting order: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'SUBMIT ORDER';
  }
}

function startNewOrder() {
  document.querySelectorAll('.qty-input').forEach(inp => { inp.value = 0; });
  document.querySelectorAll('.line-total').forEach(el => { el.textContent = '—'; });
  updateSummary();
  document.getElementById('confirmScreen').className = '';
  document.getElementById('appShell').style.display = 'block';
  switchTab(CATALOG[0].id);
}

/* ──────────────────────────────────────────────
   ORDER SUMMARY & CLIPBOARD
   ────────────────────────────────────────────── */
let lastOrderSummary = '';

function buildOrderSummaryText(orderNum, shop, items, totalUnits, totalPrice, notes) {
  let txt = `ORDER CONFIRMATION\n`;
  txt += `==================\n`;
  txt += `Order: ${orderNum}\n`;
  txt += `Shop: ${shop}\n`;
  txt += `Date: ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}\n\n`;
  txt += `ITEMS:\n`;

  const grouped = {};
  items.forEach(i => {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  for (const [cat, list] of Object.entries(grouped)) {
    txt += `\n  ${cat}\n`;
    list.forEach(i => {
      const hookStr = i.hook !== '—' ? ` | Hook ${i.hook}` : '';
      txt += `    ${i.color} | ${i.size}${hookStr} | ${i.qty} packs | $${i.total.toFixed(2)}\n`;
    });
  }

  txt += `\n------------------\n`;
  txt += `Total: ${totalUnits} packs — $${totalPrice.toFixed(2)}\n`;

  if (notes) {
    txt += `\nNotes: ${notes}\n`;
  }

  return txt;
}

function copyOrderSummary() {
  if (!lastOrderSummary) return;
  navigator.clipboard.writeText(lastOrderSummary).then(() => {
    const btn = document.querySelector('.btn-copy');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'COPIED!';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
    }
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = lastOrderSummary;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.querySelector('.btn-copy');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'COPIED!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }
  });
}

/* ──────────────────────────────────────────────
   ORDER HISTORY
   ────────────────────────────────────────────── */
function loadOrderHistory() {
  const sec = document.getElementById('sec-orderhistory');
  if (!sec || !currentShop) return;

  sec.innerHTML = '<div class="oh-loading">Loading order history...</div>';

  // Try Firebase first, fall back to localStorage
  db.ref('vendorOrders').orderByChild('shop').equalTo(currentShop).once('value')
    .then(snapshot => {
      const orders = [];
      snapshot.forEach(child => {
        orders.push({ key: child.key, ...child.val() });
      });
      renderOrderHistory(sec, orders);
    })
    .catch(() => {
      // Firebase read blocked — use localStorage
      const lsKey = 'vk_orders_' + currentShop;
      const orders = JSON.parse(localStorage.getItem(lsKey) || '[]')
        .map((o, i) => ({ key: 'ls-' + i, ...o }));
      renderOrderHistory(sec, orders);
    });
}

function renderOrderHistory(sec, orders) {
  orders.sort((a, b) => {
    const ta = a.timestamp || new Date(a.submittedAt).getTime() || 0;
    const tb = b.timestamp || new Date(b.submittedAt).getTime() || 0;
    return tb - ta;
  });

  if (!orders.length) {
    sec.innerHTML = '<div class="oh-empty">No orders yet. Place your first order from the product tabs above.</div>';
    return;
  }

  let html = `<h2 style="color:var(--gold);font-size:1.1rem;margin-bottom:16px;letter-spacing:1px">ORDER HISTORY</h2>`;

  orders.forEach(order => {
    const date = order.submittedAt ? new Date(order.submittedAt).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '—';
    const status = (order.status || 'pending').toLowerCase();
    const badgeClass = status === 'shipped' ? 'shipped' : status === 'poured' ? 'poured' : 'pending';
    const itemCount = order.items ? order.items.length : 0;
    const total = order.totalPrice ? '$' + order.totalPrice.toFixed(2) : '—';

    html += `<div class="oh-card" id="oh-${order.key}">`;
    html += `<div class="oh-card-header" onclick="toggleOrderCard('${order.key}')">`;
    html += `<div><span class="oh-order-num">${escHtml(order.orderNumber || '—')}</span> <span class="oh-date">${date}</span></div>`;
    html += `<div class="oh-meta">`;
    html += `<span>${itemCount} items, <strong>${order.totalUnits || 0}</strong> packs</span>`;
    html += `<strong>${total}</strong>`;
    html += `<span class="oh-badge ${badgeClass}">${status}</span>`;
    html += `<span class="oh-expand">&#9660;</span>`;
    html += `</div></div>`;

    html += `<div class="oh-card-body">`;
    if (order.items && order.items.length) {
      html += `<table><thead><tr><th>Color</th><th>Size</th><th>Hook</th><th>Packs</th><th style="text-align:right">Total</th></tr></thead><tbody>`;
      order.items.forEach(i => {
        html += `<tr>`;
        html += `<td data-label="Color">${escHtml(i.color || '')}</td>`;
        html += `<td data-label="Size">${i.size || ''}</td>`;
        html += `<td data-label="Hook">${i.hook || ''}</td>`;
        html += `<td data-label="Packs">${i.qty || 0}</td>`;
        html += `<td data-label="Total" class="price" style="text-align:right">$${(i.total || 0).toFixed(2)}</td>`;
        html += `</tr>`;
      });
      html += `</tbody></table>`;
    }
    if (order.notes) {
      html += `<div class="oh-notes">Notes: ${escHtml(order.notes)}</div>`;
    }
    html += `</div></div>`;
  });

  sec.innerHTML = html;
}

function toggleOrderCard(key) {
  const card = document.getElementById('oh-' + key);
  if (card) card.classList.toggle('open');
}

/* ──────────────────────────────────────────────
   UTILS
   ────────────────────────────────────────────── */
function forgotCode(e) {
  e.preventDefault();
  const shop = document.getElementById('shopSelect').value || 'my shop';
  const subject = encodeURIComponent('Access Code Request - ' + shop);
  const body = encodeURIComponent('Hi Viking Heads,\n\nI need my vendor portal access code for: ' + shop + '\n\nThank you');
  window.location.href = 'mailto:vikingheadbaits@gmail.com?subject=' + subject + '&body=' + body;
}

function adjustQty(btn, delta) {
  const input = btn.parentElement.querySelector('.qty-input');
  const val = Math.max(0, (parseInt(input.value) || 0) + delta);
  input.value = val;
  updateLine(input);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return 'h' + Math.abs(h);
}
